<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; style-src {{cspSource}}; script-src 'nonce-{{nonce}}';"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="{{styleUri}}" rel="stylesheet" />
    <title>AI Agent Monitor</title>
  </head>
  <body>
    <div class="toolbar">
      <span class="title">AI Agent Monitor</span>
      <span id="status" class="status" aria-live="polite"></span>
      <button id="clearBtn" class="clear-btn" type="button">Clear</button>
    </div>
    <div class="main-layout">
      <div id="connections" class="connections-sidebar"></div>
      <div class="main-content">
        <div id="filterBar" class="filter-bar">
          <button id="sortToggle" type="button">↓ Newest first</button>
          <input id="filterTool" type="text" placeholder="Tool name&hellip;" />
          <select id="filterServer">
            <option value="">All servers</option>
          </select>
          <select id="filterStatus">
            <option value="">All</option>
            <option value="in-progress">In-progress</option>
            <option value="completed">Completed</option>
            <option value="failed">Failed</option>
          </select>
          <select id="filterTime">
            <option value="">All</option>
            <option value="hour">Last hour</option>
            <option value="today">Today</option>
          </select>
        </div>
        <div id="log" class="log-container" role="log" aria-label="Tool call log"></div>
      </div>
    </div>
    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
  </body>
</html>
